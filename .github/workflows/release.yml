name: Package extension on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches release tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          tag_version="${tag#v}"
          manifest_version="$(jq -r '.version' manifest.json)"
          echo "release tag: $tag_version | manifest version: $manifest_version"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Release tag ($tag_version) does not match manifest version ($manifest_version). Bump \"version\" in manifest.json to match the tag."
            exit 1
          fi

      - name: Build extension zip
        run: |
          zip_name="header-injector-${{ github.event.release.tag_name }}.zip"
          echo "ZIP_NAME=$zip_name" >> "$GITHUB_ENV"
          # Package only the files Chrome needs — no store assets, docs, or repo meta.
          zip -r "$zip_name" \
            manifest.json \
            background.js \
            popup.html \
            popup.css \
            popup.js \
            icon/icon16.png \
            icon/icon32.png \
            icon/icon48.png \
            icon/icon128.png
          echo "--- package contents ---"
          unzip -l "$zip_name"

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$ZIP_NAME" --clobber
